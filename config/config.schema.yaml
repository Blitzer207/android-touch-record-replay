# 配置文件 Schema

# 设备配置
device:
  type: object
  properties:
    serial:
      type: [string, null]
      description: 设备序列号，null 表示自动检测
    touch_device:
      type: [string, null]
      description: 触摸设备路径，null 表示自动检测

# 录制配置
recording:
  type: object
  properties:
    mode:
      type: string
      enum: [realtime, batch]
      description: 录制模式
    output:
      type: string
      description: 默认输出目录
    format:
      type: string
      enum: [adb, u2, hybrid]
      description: 脚本格式
    adb_path:
      type: string
      description: adb 命令路径

# 手势识别配置
gesture:
  type: object
  properties:
    tap_threshold:
      type: number
      minimum: 0
      description: 点击最大移动距离（像素）
    tap_duration:
      type: number
      minimum: 0
      description: 点击最大持续时间（秒）
    long_press_duration:
      type: number
      minimum: 0
      description: 长按最小持续时间（秒）
    swipe_threshold:
      type: number
      minimum: 0
      description: 滑动最小距离（像素）

# 生成器配置
generator:
  type: object
  properties:
    adb:
      type: object
      properties:
        delay_enabled:
          type: boolean
    u2:
      type: object
      properties:
        delay_enabled:
          type: boolean
    hybrid:
      type: object
      properties:
        delay_enabled:
          type: boolean
        swipe_threshold:
          type: number
        long_press_threshold:
          type: number

# 回放配置
replay:
  type: object
  properties:
    backend:
      type: string
      enum: [auto, adb, u2]
      description: 回放后端
    speed:
      type: number
      minimum: 0.1
      description: 回放速度倍率
    adb_path:
      type: string

# 日志配置
logging:
  type: object
  properties:
    level:
      type: string
      enum: [DEBUG, INFO, WARNING, ERROR]
    file:
      type: [string, null]
    format:
      type: string
